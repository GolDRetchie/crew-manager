# Publiceert ALLEEN de map crew-manager/ (de frontend) naar GitHub Pages.
# De rest van de repo (bijv. server/) wordt niet gepubliceerd.
# Live op: https://goldretchie.github.io/crew-manager/

name: Deploy crew-manager to Pages

on:
  push:
    branches: [main]      # elke push naar main publiceert opnieuw
  workflow_dispatch: {}   # + handmatig kunnen draaien via de Actions-tab

permissions:
  contents: read
  pages: write
  id-token: write

# Niet twee deploys tegelijk; nieuwste wint.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload de frontend-map als Pages-artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./crew-manager   # <-- alleen deze submap wordt de site-root

      - name: Deploy naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
